<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dobrostan STUDIO | Projekty</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --color-bg: #F4F4F2; 
            --color-text-dark: #1A1A1A;
            --color-accent: #50344f; 
            --color-gold: #b9a646; 
            --grid-color: rgba(0, 0, 0, 0.1); 
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--color-bg);
            color: var(--color-text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- LEWA KOLUMNA (UJEDNOLICONA: Z-INDEX 10) --- */
        .left-column {
            width: 35%; height: 100vh; position: fixed; top: 0; left: 0;
            background-color: var(--color-bg);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 132px 132px;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            padding: 4rem 3rem; 
            z-index: 10; /* Identycznie jak na Index */
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .logo-link { text-decoration: none; color: inherit; }
        .small-logo { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.05em; }
        .small-logo span { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-weight: 400; 
            color: var(--color-gold); 
            margin-right: 0.1em; 
        }

        nav.vertical-menu { margin-top: 5rem; } /* Sztywne 5rem od logo */
        nav.vertical-menu ul { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; }
        nav.vertical-menu a { 
            text-decoration: none; color: var(--color-text-dark); 
            font-weight: 500; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em; 
            transition: 0.3s; display: inline-block; 
        }
        nav.vertical-menu a:hover, nav.vertical-menu a.active { color: var(--color-accent); transform: translateX(10px); }

        .tech-footer { margin-top: auto; font-size: 0.65rem; text-transform: uppercase; color: #666; line-height: 1.5; }

        /* --- PRAWA KOLUMNA (Z-INDEX 5) --- */
        .right-column { 
            width: 65%; margin-left: 35%; 
            padding: 6rem 5% 15rem 5%; 
            min-height: 100vh; position: relative; z-index: 5;
        }

        .portfolio-header { margin-bottom: 5rem; }
        .portfolio-header h1 { 
            font-family: 'Inter', sans-serif; font-weight: 900; 
            font-size: 4.5vw; text-transform: uppercase; 
            color: var(--color-accent); 
        }

        /* PROJEKTY */
        .project-item { position: relative; margin-bottom: 6rem; cursor: pointer; display: flex; flex-direction: column; width: 100%; }
        .project-item.align-left { align-items: flex-start; }
        .project-item.align-right { align-items: flex-end; }
        .project-image-wrapper { width: 85%; position: relative; }
        .project-image { 
            width: 100%; height: 450px; display: block; 
            filter: grayscale(100%); transition: 0.8s; object-fit: cover;
            object-position: center 80%; 
        }
        .project-item:hover .project-image { filter: grayscale(0%); transform: scale(1.02); }

        .project-title {
            position: absolute; bottom: -8%; font-family: 'Inter', sans-serif; font-weight: 900;
            font-size: 6vw; line-height: 0.8; color: var(--color-text-dark); 
            z-index: 100; /* Tytuł projektu nad wszystkim */
            pointer-events: none; white-space: nowrap;
        }
        .project-item.align-left .project-title { left: -10%; }
        .project-item.align-right .project-title { right: -5%; text-align: right; }

        .project-title span.dobro-font { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: 0.45em; color: var(--color-gold); display: block; margin-bottom: 5px; }

        .project-meta { margin-top: 4rem; font-size: 0.7rem; color: #888; letter-spacing: 0.2em; text-transform: uppercase; }

        /* MODAL */
        .gallery-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--color-bg); z-index: 200; display: none; overflow-y: auto; padding: 6rem 15%; }
        .gallery-overlay.active { display: block; }
        .close-gallery { position: fixed; top: 2rem; right: 4rem; font-size: 0.7rem; cursor: pointer; border-bottom: 1px solid; z-index: 300; text-transform: uppercase; }
        .gallery-content img { width: 100%; margin-bottom: 4rem; display: block; }
    </style>
</head>
<body>

    <aside class="left-column">
        <a href="index.html" class="logo-link">
            <div class="small-logo"><span>dobrostan</span>STUDIO</div>
        </a>
        <nav class="vertical-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projekty.html" class="active">Projekty</a></li>
                <li><a href="oferta.html">Oferta</a></li>
                <li><a href="omnie.html">O mnie</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
        <div class="tech-footer">SIEDLCE / WARSZAWA, PL</div>
    </aside>

    <main class="right-column">
        <header class="portfolio-header"><h1>PROJEKTY*</h1></header>

        <div class="project-item align-left" onclick="autoGallery('BODEGA', 5)">
            <div class="project-image-wrapper">
                <img src="Projekty/BODEGA/main.png" class="project-image" onerror="handleImageError(this)">
                <h2 class="project-title"><span class="dobro-font">restauracja</span>BODEGA</h2>
            </div>
            <div class="project-meta">SOPOT</div>
        </div>

        </main>

    <div id="gallery-modal" class="gallery-overlay">
        <div class="close-gallery" onclick="closeGallery()">ZAMKNIJ (X)</div>
        <div class="gallery-content" id="gallery-images"></div>
    </div>

    <script>
        function handleImageError(image) {
            if (image.src.includes('.png')) { image.src = image.src.replace('.png', '.jpg'); }
            return true;
        }
        function autoGallery(folder, imageCount) {
            const galleryImages = document.getElementById('gallery-images');
            galleryImages.innerHTML = '';
            for (let i = 1; i <= imageCount; i++) {
                const img = document.createElement('img');
                img.src = `Projekty/${folder}/${i}.png`;
                img.onerror = function() { if (this.src.includes('.png')) this.src = this.src.replace('.png', '.jpg'); };
                galleryImages.appendChild(img);
            }
            document.getElementById('gallery-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeGallery() {
            document.getElementById('gallery-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
