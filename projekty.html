<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dobrostan STUDIO | Projekty</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & ZMIENNE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-bg: #F4F4F2; 
            --color-text-dark: #1A1A1A;
            --color-accent: #50344f; 
            --color-gold: #b9a646; 
            --grid-color: rgba(0, 0, 0, 0.1); 
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--color-bg);
            color: var(--color-text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- LEWA KOLUMNA (STAŁA - 35%) --- */
        .left-column {
            width: 35%; height: 100vh; position: fixed; top: 0; left: 0;
            background-color: var(--color-bg);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 132px 132px;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 4rem 3rem; z-index: 100;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .logo-link { text-decoration: none; color: inherit; }
        .small-logo { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.05em; }
        .small-logo span { font-family: 'Playfair Display', serif; font-style: italic; color: var(--color-gold); }

        nav.vertical-menu { margin-top: 1rem; }
        nav.vertical-menu ul { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; }
        nav.vertical-menu a { 
            text-decoration: none; 
            color: var(--color-text-dark); 
            font-weight: 500; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 0.1em; 
            transition: color 0.3s ease, transform 0.3s ease; 
            display: inline-block; 
        }
        nav.vertical-menu a:hover, nav.vertical-menu a.active { color: var(--color-accent); transform: translateX(10px); }

        .tech-footer { font-size: 0.65rem; text-transform: uppercase; color: #666; line-height: 1.5; }

        /* --- PRAWA KOLUMNA --- */
        .right-column { 
            width: 65%; 
            margin-left: 35%; 
            padding: 6rem 10% 12rem 10%; 
            min-height: 100vh; 
        }

        .portfolio-header { margin-bottom: 6rem; }
        .portfolio-header h1 { 
            font-family: 'Inter', sans-serif; 
            font-weight: 900; 
            font-size: 4.5vw; /* Zmniejszony nagłówek */
            line-height: 1; 
            text-transform: uppercase; 
            letter-spacing: -0.02em;
            color: var(--color-accent);
        }

        /* LISTA PROJEKTÓW */
        .project-item { 
            position: relative; 
            margin-bottom: 12rem; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
        }

        .project-image-wrapper { 
            width: 90%; 
            position: relative; 
        }

        .image-container {
            width: 100%;
            overflow: hidden;
        }

        .project-image { 
            width: 100%; 
            display: block; 
            filter: grayscale(100%); 
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); 
        }

        .project-item:hover .project-image { 
            filter: grayscale(0%); 
            transform: scale(1.05); 
        }

        /* NAPRAWIONE NAPISY - WYSTAJĄCE I NIEUCIĘTE */
        .project-title {
            position: absolute; 
            bottom: -12%; 
            left: -8%; 
            font-family: 'Inter', sans-serif; 
            font-weight: 900;
            font-size: 6vw; 
            line-height: 0.8; 
            color: var(--color-text-dark); 
            z-index: 50; 
            pointer-events: none;
            white-space: nowrap;
        }

        .project-title span.dobro-font { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-weight: 400; 
            font-size: 0.4em; 
            color: var(--color-gold); 
            display: block; 
            margin-bottom: 5px;
            letter-spacing: 0.05em;
        }

        .project-meta { 
            margin-top: 5rem; 
            font-size: 0.7rem; 
            color: #888; 
            letter-spacing: 0.2em; 
            text-transform: uppercase; 
        }

        /* --- MODAL GALERII --- */
        .gallery-overlay {
            position: fixed; top: 0; left: 35%; width: 65%; height: 100vh;
            background: var(--color-bg); z-index: 200; display: none;
            overflow-y: auto; padding: 6rem 10%;
        }
        .gallery-overlay.active { display: block; animation: slideIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .close-gallery { position: fixed; top: 2rem; right: 4rem; font-size: 0.7rem; letter-spacing: 0.2em; cursor: pointer; border-bottom: 1px solid var(--color-text-dark); z-index: 300; text-transform: uppercase; }
        .gallery-content img { width: 100%; margin-bottom: 4rem; display: block; }
        .gallery-info { margin-bottom: 6rem; border-left: 4px solid var(--color-accent); padding-left: 2rem; }
        .gallery-info h2 { font-family: 'Inter', sans-serif; font-size: 3rem; text-transform: uppercase; margin-bottom: 1.5rem; line-height: 0.9; }
        .gallery-info p { font-size: 0.9rem; line-height: 1.8; color: #444; max-width: 500px; }

        /* MOBI */
        @media (max-width: 850px) {
            .left-column { width: 100%; height: auto; position: relative; padding: 2rem; background-size: 66px 66px; }
            nav.vertical-menu ul { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .right-column { width: 100%; margin-left: 0; padding: 4rem 1.5rem; }
            .gallery-overlay { left: 0; width: 100%; }
            .project-title { font-size: 11vw; position: relative; left: 0; bottom: 0; margin-top: 1rem; }
            .project-image-wrapper { width: 100%; }
        }
    </style>
</head>
<body>

    <aside class="left-column">
        <a href="index.html" class="logo-link">
            <div class="small-logo"><span>dobrostan</span>STUDIO</div>
        </a>
        <nav class="vertical-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projekty.html" class="active">Projekty</a></li>
                <li><a href="oferta.html">Oferta</a></li>
                <li><a href="omnie.html">O mnie</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>
        <div class="tech-footer">ESTD. 2024<br>SIEDLCE / WARSZAWA, PL</div>
    </aside>

    <main class="right-column">
        <header class="portfolio-header">
            <h1>PROJEKTY</h1>
        </header>

        <div class="project-item" onclick="autoGallery('Mokotow', 'Apartament Mokotów', 'Opis Twojego projektu na Mokotowie...', 5)">
            <div class="project-image-wrapper">
                <div class="image-container">
                    <img src="Projekty/Mokotow/main.jpg" class="project-image">
                </div>
                <h2 class="project-title"><span class="dobro-font">apartament</span>MOKOTÓW</h2>
            </div>
            <div class="project-meta">01 / WARSZAWA / 120 M2</div>
        </div>

        <div class="project-item" onclick="autoGallery('Izabelin', 'Rezydencja Izabelin', 'Opis projektu w Izabelinie...', 6)">
            <div class="project-image-wrapper">
                <div class="image-container">
                    <img src="Projekty/Izabelin/main.jpg" class="project-image">
                </div>
                <h2 class="project-title"><span class="dobro-font">rezydencja</span>IZABELIN</h2>
            </div>
            <div class="project-meta">02 / KAMPINOS / 350 M2</div>
        </div>

    </main>

    <div id="gallery-modal" class="gallery-overlay">
        <div class="close-gallery" onclick="closeGallery()">ZAMKNIJ (X)</div>
        <div class="gallery-info" id="gallery-info"></div>
        <div class="gallery-content" id="gallery-images"></div>
    </div>

    <script>
        // MECHANIZM AUTOMATYCZNEGO GENEROWANIA GALERII
        function autoGallery(folder, title, desc, imageCount) {
            const galleryImages = document.getElementById('gallery-images');
            const galleryInfo = document.getElementById('gallery-info');
            galleryImages.innerHTML = '';
            galleryInfo.innerHTML = `<h2>${title}</h2><p>${desc}</p>`;
            
            // Pętla sama dodaje zdjęcia 1.jpg, 2.jpg itd. z folderu projektu
            for (let i = 1; i <= imageCount; i++) {
                const img = document.createElement('img');
                img.src = `Projekty/${folder}/${i}.jpg`;
                img.loading = "lazy";
                galleryImages.appendChild(img);
            }
            
            document.getElementById('gallery-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            document.getElementById('gallery-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
