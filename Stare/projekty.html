<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kobalt Architektura | Projekty - Lista Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FFFFFF;
            --color-text-dark: #1A1A1A;
            --color-accent: #1048c5; /* Kobalt */
            --color-text-on-accent: #FFFFFF;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--color-bg);
            color: var(--color-text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
        }

        /* --- MENU (Kopia ze strony głównej) --- */
        header {
            width: 100%;
            padding: 2rem;
            position: fixed; 
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9); 
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--color-text-dark);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--color-accent);
        }

        /* --- SEKCJA LISTY INTERAKTYWNEJ --- */
        .projects-list-section {
            min-height: 100vh;
            padding: 8rem 5% 5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Nagłówek u góry */
        .projects-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--color-accent);
            font-size: 8vw; 
            text-transform: uppercase;
            margin-bottom: 5rem;
            z-index: 2; /* Zawsze nad tłem */
        }

        /* Główna lista */
        .projects-list {
            width: 100%;
            max-width: 1400px;
            list-style: none;
            z-index: 3; /* Nad tłem */
        }

        /* Element listy */
        .project-list-item {
            border-bottom: 1px solid rgba(26, 26, 26, 0.1); /* Delikatna kreska */
            transition: border-color 0.4s ease;
        }

        .project-list-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 0;
            text-decoration: none;
            color: var(--color-text-dark);
            transition: all 0.4s ease;
        }

        /* Nazwa Projektu (Wielka) */
        .list-p-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 4vw; /* Bardzo duże */
            text-transform: uppercase;
            line-height: 1;
            transition: color 0.4s ease, transform 0.4s ease;
        }

        /* Dodatkowe info (Małe) */
        .list-p-info {
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            opacity: 0.6;
            transition: opacity 0.4s ease;
        }

        /* --- HOVER EFFECTS --- */
        .project-list-item:hover {
            border-color: var(--color-accent);
        }

        .project-list-link:hover .list-p-title {
            color: var(--color-accent);
            transform: translateX(1rem); /* Delikatne przesunięcie w prawo */
        }

        .project-list-link:hover .list-p-info {
            opacity: 1;
            color: var(--color-accent);
        }

        /* --- ZDJĘCIE REVEAL W TLE (Centralne) --- */
        .bg-reveal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            max-width: 900px;
            max-height: 600px;
            z-index: 1; /* Za wszystkim */
            overflow: hidden;
            border: 1px solid var(--color-text-dark);
            padding: 10px;
            background: var(--color-bg);
            opacity: 0; /* Domyślnie niewidoczne */
            transition: opacity 0.5s ease;
            pointer-events: none; /* Nie blokuje kliknięć na napisy */
        }

        .bg-reveal-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Wypełnia kontener */
            display: block;
            filter: grayscale(100%);
            transition: transform 0.6s ease;
        }

        /* Aktywacja zdjęcia (będzie sterowana prostym JavaScriptem) */
        .projects-list-section.reveal-active .bg-reveal-container {
            opacity: 1;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                 <li><a href="index.html">HOME</a></li>
                <li><a href="projekty.html">PROJEKTY</a></li>
                <li><a href="omnie.html">O MNIE</a></li>
                
                <li><a href="kontakt.html">KONTAKT</a></li>
            </ul>
        </nav>
    </header>

    <main class="projects-list-section" id="projects-section">
        
        <h1 class="projects-heading">PROJEKTY</h1>

        <ul class="projects-list">
            
            <li class="project-list-item" data-image="projekt1.jpg">
                <a href="#" class="project-list-link">
                    <span class="list-p-title">PURE VILLA</span>
                    <span class="list-p-info">WILANÓW // NEUROARCHITEKTURA</span>
                </a>
            </li>

            <li class="project-list-item" data-image="projekt2.jpg">
                <a href="#" class="project-list-link">
                    <span class="list-p-title">KOBALTOWY APARTAMENT</span>
                    <span class="list-p-info">POWIŚLE // MINIMALIZM</span>
                </a>
            </li>

            <li class="project-list-item" data-image="projekt3.jpg">
                <a href="#" class="project-list-link">
                    <span class="list-p-title">NEURO-STUDIO</span>
                    <span class="list-p-info">ŚRÓDMIEŚCIE // BIURO ŚWIADOME</span>
                </a>
            </li>

            <li class="project-list-item" data-image="projekt4.jpg">
                <a href="#" class="project-list-link">
                    <span class="list-p-title">DOM W LESIE</span>
                    <span class="list-p-info">PODKOWA LEŚNA // DOBROSTAN</span>
                </a>
            </li>

        </ul>

        <div class="bg-reveal-container">
            <img src="" alt="Podgląd Projektu" class="bg-reveal-image" id="reveal-img">
        </div>

    </main>

    <script>
        const listItems = document.querySelectorAll('.project-list-item');
        const revealContainer = document.getElementById('projects-section');
        const revealImg = document.getElementById('reveal-img');

        listItems.forEach(item => {
            // Po najechaniu myszką
            item.addEventListener('mouseover', function() {
                const imageSrc = this.getAttribute('data-image');
                revealImg.src = imageSrc; // Podmień zdjęcie
                revealContainer.classList.add('reveal-active'); // Pokaż tło
            });

            // Po zejściu myszką
            item.addEventListener('mouseout', function() {
                revealContainer.classList.remove('reveal-active'); // Ukryj tło
                revealImg.src = ""; // Wyczyszczenie src
            });
        });
    </script>

</body>
</html>
