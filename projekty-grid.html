<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kobalt Architektura | Projekty - Siatka Editorial</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #FFFFFF;
            --color-text-dark: #1A1A1A;
            --color-accent: #004FFF; /* Kobalt */
            --color-text-light: #999999;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: var(--color-bg);
            color: var(--color-text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
        }

        /* --- MENU (Kopia ze strony głównej) --- */
        header {
            width: 100%;
            padding: 2rem;
            position: fixed; 
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9); 
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 2.5rem;
        }

        nav a {
            text-decoration: none;
            color: var(--color-text-dark);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--color-accent);
        }

        /* --- SEKCJA PROJEKTÓW --- */
        .projects-section {
            min-height: 100vh;
            padding: 10rem 5% 5rem; /* Zapas miejsca na menu i dół */
        }

        .projects-heading {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--color-accent);
            font-size: 8vw; 
            text-transform: uppercase;
            margin-bottom: 5rem;
            text-align: center;
        }

        /* Główny kontener siatki asymetrycznej */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr); /* 12-kolumnowa siatka bazy */
            gap: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Element projektu */
        .project-item {
            position: relative;
            grid-column: span 12; /* Domyślnie pełna szerokość na małych ekranach */
            text-decoration: none;
            color: var(--color-text-dark);
            margin-bottom: 3rem;
        }

        /* Kontener zdjęcia w ramce */
        .project-image-frame {
            width: 100%;
            border: 1px solid var(--color-text-dark);
            padding: 10px;
            transition: border-color 0.4s ease;
        }

        .project-image {
            width: 100%;
            display: block;
            filter: grayscale(100%); 
            transition: filter 0.5s ease;
        }

        /* Podpis techniczny */
        .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 1rem;
            letter-spacing: 0.05em;
            color: var(--color-text-light);
            transition: color 0.4s ease;
        }

        .project-meta .p-number {
            font-weight: 500;
        }

        /* --- HOVER EFFECTS --- */
        .project-item:hover .project-image-frame {
            border-color: var(--color-accent);
        }

        .project-item:hover .project-image {
            filter: grayscale(0%); 
        }

        .project-item:hover .project-meta {
            color: var(--color-accent);
        }

        /* --- UKŁAD ASYMETRYCZNY (Desktop) --- */
        @media (min-width: 1024px) {
            .project-item { margin-bottom: 0; } /* Reset marginesów bocznych */

            /* Projekt 1: Średni, po lewej */
            .project-item:nth-child(1) {
                grid-column: 1 / span 7;
                padding-right: 15%;
            }

            /* Projekt 2: Mały, po prawej, uniesiony */
            .project-item:nth-child(2) {
                grid-column: 8 / span 5;
                margin-top: -10rem; 
            }

            /* Projekt 3: Pionowy, po lewej, przesunięty w dół */
            .project-item:nth-child(3) {
                grid-column: 2 / span 5;
                margin-top: 10rem;
                padding-right: 10%;
            }

            /* Projekt 4: Duży, po prawej, centralny */
            .project-item:nth-child(4) {
                grid-column: 7 / span 6;
                margin-top: -5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="#projekty" class="active">PROJEKTY</a></li>
                <li><a href="#omnie">O MNIE</a></li>
                <li><a href="#oferta">OFERTA</a></li>
                <li><a href="#kontakt">KONTAKT</a></li>
            </ul>
        </nav>
    </header>

    <main class="projects-section">
        <h1 class="projects-heading">PROJEKTY</h1>

        <div class="projects-grid">
            
            <a href="#" class="project-item">
                <div class="project-image-frame">
                    <img src="projekt1.jpg" alt="Pure Villa" class="project-image">
                </div>
                <div class="project-meta">
                    <span class="p-number">01 //</span>
                    <span class="p-title">PURE VILLA // WILANÓW</span>
                    <span class="p-tag">NEUROARCHITEKTURA</span>
                </div>
            </a>

            <a href="#" class="project-item">
                <div class="project-image-frame">
                    <img src="projekt2.jpg" alt="Kobaltowy Apartament" class="project-image">
                </div>
                <div class="project-meta">
                    <span class="p-number">02 //</span>
                    <span class="p-title">KOBALTOWE WNĘTRZE // POWIŚLE</span>
                    <span class="p-tag">MINIMALIZM</span>
                </div>
            </a>

            <a href="#" class="project-item">
                <div class="project-image-frame">
                    <img src="projekt3.jpg" alt="Studio Kreatywne" class="project-image">
                </div>
                <div class="project-meta">
                    <span class="p-number">03 //</span>
                    <span class="p-title">NEURO-STUDIO // ŚRÓDMIEŚCIE</span>
                    <span class="p-tag">BIUROŚWIADOME</span>
                </div>
            </a>

            <a href="#" class="project-item">
                <div class="project-image-frame">
                    <img src="projekt4.jpg" alt="Dom w Lesie" class="project-image">
                </div>
                <div class="project-meta">
                    <span class="p-number">04 //</span>
                    <span class="p-title">DOM W LESIE // PODKOWA LEŚNA</span>
                    <span class="p-tag">DOBROSTAN</span>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
